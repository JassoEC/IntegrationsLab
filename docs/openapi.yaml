openapi: 3.0.0

info:
  title: Automated Notification & Payment System
  version: 1.0.0
  description: |
    API for automating payment processing and customer notifications
    across WhatsApp, Stripe, and MercadoPago — built on Supabase Edge Functions.

    ## What this solves

    Businesses need to confirm payments and reach customers instantly.
    This API connects payment events to WhatsApp notifications automatically:

    ```
    Customer pays (Stripe / MercadoPago)
         │
         ▼
    Payment confirmed
         │
         ▼
    WhatsApp message sent to customer
    ```

    No manual follow-up. No delayed confirmations. Every payment event
    is logged, auditable, and replayable.

    ## System layers

    | Layer | Status | Description |
    |---|---|---|
    | **API (this spec)** | current | Headless. Consumed by any client. |
    | Web dashboard | planned | Next.js |
    | Mobile app | planned | React Native / Expo |

    ## Authentication

    This API uses **Supabase Auth** in a headless manner — no frontend required.
    Any HTTP client (Postman, mobile app, web app) uses the same flow.

    ### Flow

    1. Register with `POST /auth/v1/signup`
    2. Sign in with `POST /auth/v1/token?grant_type=password`
    3. Use the returned `access_token` as `Bearer` token on protected endpoints
    4. Renew the token with `POST /auth/v1/token?grant_type=refresh_token`

    ### Required headers on all requests

    - `apikey`: the public anon key of the Supabase project
    - `Authorization: Bearer <access_token>` (only on protected endpoints)

servers:
  - url: https://{project_ref}.supabase.co
    description: Supabase project
    variables:
      project_ref:
        description: Supabase project ID (e.g. abcdefghijklmnop)
        default: your-project-ref

components:
  securitySchemes:
    AnonKey:
      type: apiKey
      in: header
      name: apikey
      description: Public anon key of the Supabase project. Required on every request.

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtained from the login endpoint (`/auth/v1/token`).
        Passed as `Authorization: Bearer <access_token>`.

  schemas:
    AuthCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: supersecret123

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token. Valid for 1 hour by default.
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Seconds until the access_token expires.
          example: 3600
        refresh_token:
          type: string
          description: Long-lived token used to renew the access_token.
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          example: authenticated
        created_at:
          type: string
          format: date-time
        last_sign_in_at:
          type: string
          format: date-time

    AuthError:
      type: object
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string
          example: Invalid login credentials

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone_number:
          type: string
          example: "whatsapp:+521234567890"
        display_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [inbound, outbound]
        provider:
          type: string
          example: whatsapp_twilio
        body:
          type: string
        media_url:
          type: string
          nullable: true
        status:
          type: string
          example: received
        external_id:
          type: string
        created_at:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel:
          type: string
          example: whatsapp
        status:
          type: string
          enum: [open, closed, pending]
        last_message_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        contacts:
          $ref: '#/components/schemas/Contact'

    ConversationWithMessages:
      allOf:
        - $ref: '#/components/schemas/Conversation'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'

    SendMessageRequest:
      type: object
      required: [to, body]
      properties:
        to:
          type: string
          description: Recipient phone number in E.164 format with whatsapp prefix.
          example: "whatsapp:+521234567890"
        body:
          type: string
          description: Text content of the message.
          example: "Your payment has been confirmed. Thank you!"
        provider:
          type: string
          enum: [twilio, meta]
          default: twilio
          description: Provider to use for delivery. Defaults to `twilio`.

    SendMessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Internal message record ID.
        external_id:
          type: string
          description: Provider message ID (Twilio MessageSid or Meta message ID).
        conversation_id:
          type: string
          format: uuid
          description: Conversation this message was threaded into.
        status:
          type: string
          example: sent

    WebhookEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          example: whatsapp_twilio
        event_type:
          type: string
          example: message.received
        payload:
          type: object
        status:
          type: string
          enum: [pending, processed, failed]
        created_at:
          type: string
          format: date-time

    TwilioWebhookPayload:
      type: object
      description: Form-encoded fields sent by Twilio on an inbound WhatsApp message.
      properties:
        From:
          type: string
          example: "whatsapp:+521234567890"
        To:
          type: string
          example: "whatsapp:+14155238886"
        Body:
          type: string
          example: "Hello!"
        MessageSid:
          type: string
          example: "SMxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        MediaUrl0:
          type: string
          description: Present only if the message includes media.

    MetaWebhookPayload:
      type: object
      description: JSON payload sent by Meta Cloud API on an inbound WhatsApp message.
      properties:
        object:
          type: string
          example: whatsapp_business_account
        entry:
          type: array
          items:
            type: object
            properties:
              changes:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: object
                      properties:
                        messages:
                          type: array
                          items:
                            type: object
                            properties:
                              from:
                                type: string
                                example: "521234567890"
                              id:
                                type: string
                              type:
                                type: string
                                example: text
                              text:
                                type: object
                                properties:
                                  body:
                                    type: string
                        metadata:
                          type: object
                          properties:
                            phone_number_id:
                              type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Internal payment record ID.
        external_id:
          type: string
          description: Stripe Checkout Session ID (cs_...).
        payment_url:
          type: string
          format: uri
          description: Stripe-hosted checkout URL. Send this to the customer to complete payment.
        status:
          type: string
          enum: [pending, processing, succeeded, failed, refunded]
        provider:
          type: string
          example: stripe
        amount:
          type: number
          format: float
          example: 20.00
        currency:
          type: string
          example: usd
        created_at:
          type: string
          format: date-time

    CreatePaymentRequest:
      type: object
      required: [amount, currency, customer_phone]
      properties:
        amount:
          type: number
          format: float
          description: Payment amount as a decimal (e.g., 20.00 for $20 USD).
          example: 20.00
        currency:
          type: string
          description: ISO 4217 currency code.
          example: usd
        customer_phone:
          type: string
          description: |
            Customer phone number in E.164 format. Used to send a WhatsApp
            confirmation when the payment succeeds.
          example: "+521234567890"
        description:
          type: string
          description: Product or order description shown on the Stripe checkout page.
          example: "Order #1042 — Pro Plan"
        success_url:
          type: string
          format: uri
          description: |
            URL to redirect to after a successful payment.
            Defaults to `STRIPE_SUCCESS_URL` env var if not provided.
          example: "https://yourdomain.com/success"
        cancel_url:
          type: string
          format: uri
          description: |
            URL to redirect to if the customer cancels.
            Defaults to `STRIPE_CANCEL_URL` env var if not provided.
          example: "https://yourdomain.com/cancel"

    CreatePaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Internal payment record ID.
        external_id:
          type: string
          description: Stripe Checkout Session ID.
        payment_url:
          type: string
          format: uri
          description: Stripe-hosted checkout page. Redirect the customer here to complete payment.
        status:
          type: string
          example: pending

    StripeWebhookPayload:
      type: object
      description: |
        Stripe event object. Only `checkout.session.completed` and
        `checkout.session.expired` are processed; all other event types
        are acknowledged and ignored.
      properties:
        id:
          type: string
          example: "evt_1234567890"
        type:
          type: string
          example: "checkout.session.completed"
        data:
          type: object
          properties:
            object:
              type: object
              description: The Stripe object that triggered the event (a Checkout Session).
              properties:
                id:
                  type: string
                  example: "cs_test_..."
                payment_status:
                  type: string
                  example: "paid"
                amount_total:
                  type: integer
                  description: Amount in smallest currency unit (cents).
                  example: 2000
                currency:
                  type: string
                  example: "usd"

tags:
  - name: Auth
    description: |
      Authentication endpoints provided by Supabase Auth.
      Base path: `/auth/v1`

      These endpoints are consumed identically by any client layer
      (Postman, Next.js, React Native) — the headless API contract does not change.

  - name: WhatsApp Messaging
    description: |
      Outbound messaging and conversation management.

      All endpoints are public (no Bearer token required) — designed to be called
      from internal services or trusted backend clients using the service role key.

  - name: Stripe Payments
    description: |
      Create Stripe Checkout Sessions and manage payment records.

      **Flow:**
      1. Call `POST /functions/v1/payments-create` with amount, currency, and customer phone.
      2. Redirect the customer to the returned `payment_url` (Stripe-hosted checkout).
      3. Stripe calls `POST /functions/v1/webhooks-stripe` when payment completes.
      4. The webhook handler updates the payment status and sends a WhatsApp confirmation.

  - name: Stripe Webhooks
    description: |
      Inbound webhook endpoint for Stripe events.

      **Signature validation:** Stripe signs every request with HMAC-SHA256.
      The signature is sent in the `Stripe-Signature` header as
      `t=<timestamp>,v1=<sig>`. Requests with an invalid signature or older
      than 5 minutes return `401`.

      **Handled events:**

      | Event | Action |
      |---|---|
      | `checkout.session.completed` | Payment succeeded → update DB status + send WhatsApp |
      | `checkout.session.expired` | Session expired → update DB status to `failed` |
      | All others | Acknowledged (`200`) and ignored |

  - name: WhatsApp Webhooks
    description: |
      Inbound webhook endpoints for WhatsApp messages.

      Two providers are supported — each has its own endpoint, signature
      validation method, and payload format, but both write to the same
      `webhook_events` and `messages` tables.

      | Provider | Endpoint | Signature header | Format |
      |---|---|---|---|
      | Twilio | `/functions/v1/webhooks-whatsapp-twilio` | `X-Twilio-Signature` | Form-encoded |
      | Meta Cloud API | `/functions/v1/webhooks-whatsapp-meta` | `X-Hub-Signature-256` | JSON |

      Webhooks are public endpoints (no Bearer token required) — the provider
      signature is the authentication mechanism.

paths:
  /auth/v1/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user with email and password.

        If the project has **email confirmation enabled**, the user will receive
        a verification email and `session` will be `null` until confirmed.

        If disabled, an active session is returned immediately.
      security:
        - AnonKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
            example:
              email: user@example.com
              password: supersecret123
      responses:
        '200':
          description: User created. Session included if email confirmation is disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          description: Email already registered or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Sign in / Refresh token
      description: |
        Polymorphic endpoint controlled by `grant_type`:

        - `password` — sign in with email and password. Returns `access_token` and `refresh_token`.
        - `refresh_token` — renew the `access_token` using a valid `refresh_token`.

        The `access_token` is a JWT valid for 1 hour (configurable in the Supabase project).
        The `refresh_token` does not expire unless revoked or rotated.
      security:
        - AnonKey: []
      parameters:
        - in: query
          name: grant_type
          required: true
          schema:
            type: string
            enum: [password, refresh_token]
          description: Authentication grant type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Sign in with password
                  $ref: '#/components/schemas/AuthCredentials'
                - title: Refresh token
                  type: object
                  required: [refresh_token]
                  properties:
                    refresh_token:
                      type: string
            examples:
              password:
                summary: Sign in with email and password
                value:
                  email: user@example.com
                  password: supersecret123
              refresh:
                summary: Renew access token
                value:
                  refresh_token: your-refresh-token-here
      responses:
        '200':
          description: Active session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          description: Invalid credentials or expired refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

  /auth/v1/user:
    get:
      tags: [Auth]
      summary: Get authenticated user
      description: |
        Returns the user associated with the active `access_token`.
        Useful to verify the token is valid and retrieve the `user.id`.
      security:
        - AnonKey: []
        - BearerAuth: []
      responses:
        '200':
          description: Authenticated user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Invalid or expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

  /auth/v1/logout:
    post:
      tags: [Auth]
      summary: Sign out
      description: |
        Invalidates the current `access_token` and `refresh_token`.
        After this request, both tokens are revoked server-side.
      security:
        - AnonKey: []
        - BearerAuth: []
      responses:
        '204':
          description: Successfully signed out. No response body.
        '401':
          description: Invalid or already expired token.

  /functions/v1/webhooks-whatsapp-twilio:
    post:
      tags: [WhatsApp Webhooks]
      summary: Receive inbound WhatsApp message (Twilio)
      description: |
        Called by Twilio when a WhatsApp message is received on the configured number.

        **Signature validation:** Twilio signs every request with HMAC-SHA1 over the
        full webhook URL + sorted POST parameters. The signature is sent in the
        `X-Twilio-Signature` header. Requests with an invalid signature return `401`.

        **Processing flow:**
        1. Validate `X-Twilio-Signature`
        2. Persist raw payload to `webhook_events`
        3. Store message to `messages`
        4. Upsert contact + conversation (conversation-service)
        5. Thread message into conversation
        6. Auto-reply if message matches a keyword trigger (automation-engine)
        7. Mark event as `processed`
        8. Return `200` (empty body)

        Twilio retries the webhook if it does not receive a `2xx` within 15 seconds.
      parameters:
        - in: header
          name: X-Twilio-Signature
          required: true
          schema:
            type: string
          description: HMAC-SHA1 signature computed by Twilio.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwilioWebhookPayload'
      responses:
        '200':
          description: Event received and stored. Empty body.
        '401':
          description: Invalid Twilio signature.
        '415':
          description: Content-Type must be application/x-www-form-urlencoded.
        '500':
          description: Failed to persist event or message.

  /functions/v1/webhooks-whatsapp-meta:
    get:
      tags: [WhatsApp Webhooks]
      summary: Verify webhook endpoint (Meta)
      description: |
        Meta sends a one-time `GET` request to verify the webhook URL during setup.

        The endpoint must respond with the `hub.challenge` value if the
        `hub.verify_token` matches `META_VERIFY_TOKEN`.
      parameters:
        - in: query
          name: hub.mode
          schema:
            type: string
            example: subscribe
        - in: query
          name: hub.verify_token
          schema:
            type: string
        - in: query
          name: hub.challenge
          schema:
            type: string
      responses:
        '200':
          description: Token matched. Returns the challenge string.
        '403':
          description: Token mismatch.
    post:
      tags: [WhatsApp Webhooks]
      summary: Receive inbound WhatsApp message (Meta Cloud API)
      description: |
        Called by Meta when a WhatsApp message is received on the configured
        phone number.

        **Signature validation:** Meta signs the raw request body with HMAC-SHA256
        using the app secret. The signature is sent in `X-Hub-Signature-256` as
        `sha256=<hex>`. Requests with an invalid signature return `401`.

        **Processing flow:**
        1. Validate `X-Hub-Signature-256`
        2. Persist raw payload to `webhook_events`
        3. Store message to `messages`
        4. Upsert contact + conversation (conversation-service)
        5. Thread message into conversation
        6. Auto-reply if message matches a keyword trigger (automation-engine)
        7. Mark event as `processed`
        8. Return `200` (empty body)

        Meta retries the webhook if it does not receive a `200` within 20 seconds.

        Non-message notifications (delivery receipts, read receipts) are acknowledged
        with `200` but not stored as messages.
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature computed by Meta. Format — `sha256:<hex>`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetaWebhookPayload'
      responses:
        '200':
          description: Event received and stored. Empty body.
        '401':
          description: Invalid Meta signature.
        '500':
          description: Failed to persist event or message.

  /functions/v1/messages-send:
    post:
      tags: [WhatsApp Messaging]
      summary: Send an outbound WhatsApp message
      description: |
        Sends a WhatsApp message to any phone number via the configured provider.

        On success the message is stored in `messages`, the contact is upserted in
        `contacts`, and the message is threaded into an open `conversation`.

        **Providers:**
        - `twilio` (default) — uses Twilio Messages API with Basic auth
        - `meta` — uses Meta Graph API v19.0

        Returns `502` if the provider API call fails (e.g. invalid credentials,
        number not in sandbox).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              twilio:
                summary: Send via Twilio
                value:
                  to: "whatsapp:+521234567890"
                  body: "Your payment has been confirmed. Thank you!"
                  provider: twilio
              meta:
                summary: Send via Meta Cloud API
                value:
                  to: "521234567890"
                  body: "Your payment has been confirmed. Thank you!"
                  provider: meta
      responses:
        '200':
          description: Message sent and stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Unknown provider.
        '422':
          description: Missing required fields `to` or `body`.
        '502':
          description: Provider API call failed.

  /functions/v1/conversations-list:
    get:
      tags: [WhatsApp Messaging]
      summary: List conversations
      description: |
        Returns a paginated list of conversations ordered by most recent message.

        Each conversation includes the associated contact's `phone_number` and
        `display_name`.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed, pending]
            default: open
          description: Filter by conversation status.
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Number of results per page.
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: Pagination offset.
      responses:
        '200':
          description: Paginated list of conversations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'
                  count:
                    type: integer
                    description: Total number of conversations matching the filter.
                  limit:
                    type: integer
                  offset:
                    type: integer
        '500':
          description: Database error.

  /functions/v1/payments-create:
    post:
      tags: [Stripe Payments]
      summary: Create a Stripe Checkout Session
      description: |
        Creates a Stripe-hosted Checkout Session for a given amount and returns
        the `payment_url` the customer must visit to complete payment.

        On success, a `payments` record is inserted with `status: pending`.
        The `customer_phone` is stored in the payment metadata and used by the
        webhook handler to send a WhatsApp confirmation once payment succeeds.

        **Amount format:** pass the human-readable decimal amount (e.g., `20.00`
        for $20 USD). The function converts to smallest unit (cents) when calling
        Stripe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
            examples:
              usd:
                summary: $20 USD payment
                value:
                  amount: 20.00
                  currency: usd
                  customer_phone: "+521234567890"
                  description: "Order #1042 — Pro Plan"
              mxn:
                summary: 350 MXN payment
                value:
                  amount: 350.00
                  currency: mxn
                  customer_phone: "+521234567890"
                  description: "Suscripción mensual"
      responses:
        '201':
          description: Checkout Session created. Redirect customer to `payment_url`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentResponse'
        '400':
          description: Invalid JSON body.
        '422':
          description: Missing required fields (amount, currency, customer_phone).
        '502':
          description: Stripe API call failed (invalid key, network error, etc.).
        '500':
          description: Payment record could not be stored in the database.

  /functions/v1/webhooks-stripe:
    post:
      tags: [Stripe Webhooks]
      summary: Receive Stripe webhook event
      description: |
        Called by Stripe when a payment event occurs on the configured webhook endpoint.

        **Signature validation:** The `Stripe-Signature` header is verified with
        HMAC-SHA256 against `STRIPE_WEBHOOK_SECRET`. Events older than 5 minutes
        are rejected to prevent replay attacks.

        **Processing flow:**
        1. Validate `Stripe-Signature`
        2. Persist raw event to `webhook_events`
        3. If `checkout.session.completed` → update payment status to `succeeded`
           and send WhatsApp notification to `customer_phone`
        4. If `checkout.session.expired` → update payment status to `failed`
        5. Mark event as `processed`
        6. Return `200`

        Stripe retries the webhook up to 3 days if it does not receive a `2xx`.
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature computed by Stripe. Format — `t=<timestamp>,v1=<sig>`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeWebhookPayload'
      responses:
        '200':
          description: Event received and processed. Empty body.
        '401':
          description: Invalid or expired Stripe signature.
        '400':
          description: Malformed JSON body.
        '500':
          description: Failed to persist event to the database.

  /functions/v1/conversations-get/{id}:
    get:
      tags: [WhatsApp Messaging]
      summary: Get conversation with messages
      description: |
        Returns a single conversation including the full message thread (up to 100
        messages, ordered chronologically) and the associated contact.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID.
      responses:
        '200':
          description: Conversation with embedded messages and contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationWithMessages'
        '404':
          description: Conversation not found.
        '500':
          description: Database error.
